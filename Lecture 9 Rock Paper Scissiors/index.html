<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Rock Paper Scissors</h1>
        
        <div class="choices">
            <button class="choice-btn" data-choice="rock">
                <span class="choice-icon">✊</span>
                <span class="choice-name">Rock</span>
            </button>
            <button class="choice-btn" data-choice="paper">
                <span class="choice-icon">✋</span>
                <span class="choice-name">Paper</span>
            </button>
            <button class="choice-btn" data-choice="scissors">
                <span class="choice-icon">✌️</span>
                <span class="choice-name">Scissors</span>
            </button>
        </div>

        <div class="score-board">
            <div class="score-item">
                <div class="score-number" id="playerScore">0</div>
                <div class="score-label">You</div>
            </div>
            <div class="score-item">
                <div class="score-number" id="computerScore">0</div>
                <div class="score-label">Comp</div>
            </div>
        </div>

        <div class="result" id="result">Make your choice!</div>

        <button class="reset-btn" id="resetBtn">Reset Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
